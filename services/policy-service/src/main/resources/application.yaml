server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: policy-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/policydb}
    username: ${SPRING_DATASOURCE_USERNAME:policy_user}
    password: ${SPRING_DATASOURCE_PASSWORD:Policy@123Password!}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:8081/oauth2/jwks}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  structured:
    format:
      console: ecs

app:
  kafka:
    policy-topic: ${POLICY_EVENTS_TOPIC:policy-events.v1}
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:25}
    fixed-delay-ms: ${OUTBOX_FIXED_DELAY_MS:5000}
