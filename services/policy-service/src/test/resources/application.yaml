spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:policydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/oauth2/jwks

app:
  kafka:
    policy-topic: policy-events.v1
  outbox:
    enabled: false
