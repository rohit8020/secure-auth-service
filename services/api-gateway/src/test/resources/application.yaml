spring:
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/oauth2/jwks
  cloud:
    compatibility-verifier:
      enabled: false

management:
  health:
    redis:
      enabled: false

app:
  rate-limit:
    login-per-minute: 10
    claim-submit-per-minute: 20
