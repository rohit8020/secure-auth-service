apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 30s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus:9090"]
      - job_name: auth-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["auth-service:8081"]
      - job_name: policy-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["policy-service:8082"]
      - job_name: claims-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["claims-service:8083"]
      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["api-gateway:8080"]
  alerts.yml: |
    groups:
      - name: insurance-platform
        rules:
          - alert: ServiceDown
            expr: up{job=~"auth-service|policy-service|claims-service|api-gateway"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Service is down
              description: "{{ $labels.job }} has been unreachable for more than 2 minutes."
          - alert: OutboxBacklogGrowing
            expr: sum(outbox_events_ready{service=~"policy-service|claims-service"}) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Outbox backlog is not draining
              description: "Transactional outbox backlog has remained non-zero for at least 10 minutes."
          - alert: OutboxFailuresPresent
            expr: sum(outbox_events_failed{service=~"policy-service|claims-service"}) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Failed outbox events detected
              description: "At least one outbox event is stuck in FAILED state."
