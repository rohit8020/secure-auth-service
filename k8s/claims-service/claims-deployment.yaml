apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claims-service
  template:
    metadata:
      labels:
        app: claims-service
    spec:
      containers:
        - name: claims-service
          image: rohit8020/claims-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: claims-config
                  key: SERVER_PORT
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: claims-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: claims-config
                  key: SPRING_DATA_REDIS_PORT
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: claims-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: POLICY_EVENTS_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: claims-config
                  key: POLICY_EVENTS_TOPIC
            - name: CLAIM_EVENTS_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: claims-config
                  key: CLAIM_EVENTS_TOPIC
            - name: POLICY_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: claims-config
                  key: POLICY_SERVICE_BASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: JWT_SECRET
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: INTERNAL_API_KEY
