apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
type: Opaque
stringData:
  JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters
  JWT_EXPIRATION: "3600000"
  JWT_REFRESH_EXPIRATION: "86400000"
  BOOTSTRAP_ADMIN_USERNAME: admin
  BOOTSTRAP_ADMIN_PASSWORD: Admin@12345
  INTERNAL_API_KEY: internal-shared-key
