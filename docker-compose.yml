services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: authdb
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: Auth@123Password!
      MYSQL_ROOT_PASSWORD: Root@123Password!
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -pRoot@123Password!"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: policydb
      POSTGRES_USER: policy_user
      POSTGRES_PASSWORD: Policy@123Password!
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy_user -d policydb"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  kafka:
    image: bitnamilegacy/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/authdb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: Auth@123Password!
      JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 86400000
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: Admin@12345
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  policy-service:
    build:
      context: .
      dockerfile: services/policy-service/Dockerfile
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/policydb
      SPRING_DATASOURCE_USERNAME: policy_user
      SPRING_DATASOURCE_PASSWORD: Policy@123Password!
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters
      INTERNAL_API_KEY: internal-shared-key
      POLICY_EVENTS_TOPIC: policy-events
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  claims-service:
    build:
      context: .
      dockerfile: services/claims-service/Dockerfile
    environment:
      SERVER_PORT: 8083
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters
      POLICY_SERVICE_BASE_URL: http://policy-service:8082
      INTERNAL_API_KEY: internal-shared-key
      POLICY_EVENTS_TOPIC: policy-events
      CLAIM_EVENTS_TOPIC: claim-events
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      policy-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8081
      POLICY_SERVICE_URL: http://policy-service:8082
      CLAIMS_SERVICE_URL: http://claims-service:8083
      JWT_SECRET: my-super-secret-key-that-is-at-least-32-characters
      LOGIN_RATE_LIMIT: 10
      CLAIM_SUBMIT_RATE_LIMIT: 20
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      auth-service:
        condition: service_started
      policy-service:
        condition: service_started
      claims-service:
        condition: service_started
